name: build-validate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build-validate:
    name: build-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Eslint
        run: npm run lint:eslint

      - name: Run Stylelint
        run: npm run lint:stylelint

      - name: Run FSD Lint
        run: npm run fsd:lint

      - name: Run Tests
        run: npm run test:run

      - name: Build
        run: npm run build
